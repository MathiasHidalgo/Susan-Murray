<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Susan Murray</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      font-weight: 600;
    }
    .stat-card .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1;
    }
    .stat-card .stat-sub {
      font-size: 12px;
      color: #aaa;
    }
    .stat-card.warning { border-left: 4px solid #f59e0b; }
    .stat-card.danger  { border-left: 4px solid #ef4444; }
    .stat-card.success { border-left: 4px solid #16a34a; }
    .stat-card.info    { border-left: 4px solid #4f46e5; }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a1a2e;
    }

    .two-panel {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* Recent list rows */
    .recent-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .recent-row:last-child { border-bottom: none; }
    .recent-row-info { flex: 1; }
    .recent-row-info h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .recent-row-info p {
      font-size: 12px;
      color: #888;
    }

    /* Low stock rows */
    .low-stock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .low-stock-row:last-child { border-bottom: none; }
    .low-stock-row .item-name { font-weight: 600; }
    .low-stock-row .item-detail { color: #888; font-size: 12px; }
    .stock-count {
      font-weight: 700;
      color: #ef4444;
      font-size: 15px;
    }

    .empty-panel {
      text-align: center;
      padding: 32px;
      color: #bbb;
      font-size: 14px;
    }

    .view-all {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }
    .view-all:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .two-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="brand">🧺 Susan Murray</span>
    <a href="index.html">Dashboard</a>
    <a href="inventory.html">Inventory</a>
    <a href="create-list.html">New List</a>
    <a href="approval.html">Approvals</a>
  </nav>

  <div class="container">
    <h1>Dashboard</h1>

    <!-- Stat Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Loading...</div></div>
    </div>

    <!-- Two panels -->
    <div class="two-panel">

      <!-- Recent Packing Lists -->
      <div class="panel">
        <div class="section-title">🕐 Recent Packing Lists</div>
        <div id="recentLists">
          <div class="empty-panel">Loading...</div>
        </div>
        <a href="approval.html" class="view-all">View all packing lists →</a>
      </div>

      <!-- Low Stock -->
      <div class="panel">
        <div class="section-title">⚠️ Low Stock Items</div>
        <div id="lowStockList">
          <div class="empty-panel">Loading...</div>
        </div>
        <a href="inventory.html" class="view-all">View full inventory →</a>
      </div>

    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
