<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Packing List — Susan Murray</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a1a2e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }
    .ref-badge {
      display: inline-block;
      background: #ede9fe;
      color: #4f46e5;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 24px;
    }
    .items-table {
      width: 100%;
      border-collapse: collapse;
    }
    .items-table th {
      background: #f4f6f9;
      color: #555;
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
    }
    .items-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    .items-table input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .add-row-btn {
      margin-top: 12px;
      background: #f0f0ff;
      color: #4f46e5;
      border: 1px dashed #4f46e5;
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .submit-btn:hover { background: #4338ca; }
    @media (max-width: 600px) {
      .two-col, .three-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="brand">🧺 Susan Murray</span>
    <a href="index.html">Dashboard</a>
    <a href="inventory.html">Inventory</a>
    <a href="create-list.html">New List</a>
    <a href="approval.html">Approvals</a>
  </nav>

  <div class="container">
    <h1>New Packing List</h1>
    <div class="ref-badge" id="refDisplay">Generating ref#...</div>

    <!-- Created By -->
    <div class="card">
      <h2>👤 Created By</h2>
      <div class="form-group">
        <label>Employee</label>
        <select id="createdBy">
          <option value="">Loading...</option>
        </select>
      </div>
    </div>

    <!-- Bill To -->
    <div class="card">
      <h2>💳 Bill To</h2>
      <div class="two-col">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="billToName" placeholder="e.g. Sky Schapiro"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="billToPhone" placeholder="e.g. 416-414-6912"/>
        </div>
      </div>
    </div>

    <!-- Ship To -->
    <div class="card">
      <h2>📦 Ship To</h2>
      <div class="two-col">
        <div class="form-group">
          <label>Company / Venue Name</label>
          <input type="text" id="shipToName" placeholder="e.g. Beth Sholom"/>
        </div>
        <div class="form-group">
          <label>Event Name</label>
          <input type="text" id="shipToEvent" placeholder="e.g. Gabes Bar-Mitzvah"/>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label>Address</label>
        <input type="text" id="shipToAddress" placeholder="e.g. 1445 Eglinton Ave West, Toronto, ON M6C 2E6"/>
      </div>
    </div>

    <!-- Logistics -->
    <div class="card">
      <h2>🚚 Logistics</h2>
      <div class="three-col">
        <div class="form-group">
          <label>Ship Date</label>
          <input type="date" id="shipDate"/>
        </div>
        <div class="form-group">
          <label>Ship Via</label>
          <input type="text" id="shipVia" placeholder="e.g. SMI"/>
        </div>
        <div class="form-group">
          <label>Tracking No.</label>
          <input type="text" id="trackingNumber" placeholder="e.g. SKY EMAIL"/>
        </div>
        <div class="form-group">
          <label>Delivery Time</label>
          <input type="text" id="deliveryTime" placeholder="e.g. Thursday"/>
        </div>
        <div class="form-group">
          <label>Return Date</label>
          <input type="date" id="returnDate"/>
        </div>
        <div class="form-group">
          <label>Event Date</label>
          <input type="date" id="eventDate"/>
        </div>
      </div>
    </div>

    <!-- Items -->
    <div class="card">
      <h2>📋 Items</h2>
      <table class="items-table">
        <thead>
          <tr>
            <th>Item (Fabric)</th>
            <th>Description (Color + Size)</th>
            <th style="width:80px">Qty</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <button class="add-row-btn" onclick="addItemRow()">+ Add Item</button>
    </div>

    <!-- Note -->
    <div class="card">
      <h2>📝 Note</h2>
      <textarea id="note" rows="3"
        style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px"
        placeholder="Any special instructions..."></textarea>
    </div>

    <button class="submit-btn" onclick="submitList()">Submit Packing List</button>
    <br/><br/>
  </div>

  <script src="js/create-list.js"></script>
</body>
</html>
